<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUDU'S HOUSE ASSET PLANER </title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0d0f14; --bg2: #13161e; --bg3: #1a1e28;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #e8eaf0; --text2: #8b8fa8; --text3: #555870;
    --accent: #4f8ef7; --green: #3ecf8e; --amber: #f5a623; --red: #f06e6e;
    --mono: 'DM Mono', monospace; --sans: 'Pretendard', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); padding-bottom: 80px; }
  .page { max-width: 1400px; margin: 0 auto; padding: 30px 20px; }
  .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 25px; }
  .s-card { background: var(--bg2); border: 1px solid var(--border); padding: 18px; border-radius: 16px; }
  .s-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
  .s-value { font-size: 20px; font-family: var(--mono); font-weight: 500; color: var(--text); }
  .s-sub { font-size: 11px; margin-top: 5px; color: var(--text2); }

  .year-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .tab-btn { background: var(--bg2); border: 1px solid var(--border); color: var(--text2); padding: 6px 14px; border-radius: 8px; cursor: pointer; font-family: var(--mono); font-size: 13px; }
  .tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .grid-main { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 1000px) { .grid-main { grid-template-columns: 1fr; } }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; }
  .card-title { font-size: 13px; color: var(--text3); margin-bottom: 15px; font-weight: 600; text-transform: uppercase; }

  .table-wrap { overflow: auto; max-height: 400px; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: var(--bg3); color: var(--text3); padding: 12px; position: sticky; top: 0; text-align: left; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  input, select, textarea { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 8px; border-radius: 6px; font-family: var(--mono); outline: none; width: 100%; }
  textarea { resize: none; font-family: var(--sans); font-size: 13px; line-height: 1.6; color: var(--text); }

  .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
</style>
</head>
<body>
  <div style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-bottom: 20px;">
        <button onclick="exportData()" style="padding: 8px 16px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 13px;">
            📥 데이터 내보내기 (JSON)
        </button>
        <button onclick="document.getElementById('importFile').click()" style="padding: 8px 16px; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 13px;">
            📤 데이터 불러오기 (JSON)
        </button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    </div>
<div class="page">
  <div class="header-flex">
    <h2 style="font-size: 20px;">DUDU'S HOUSE ASSET Dashboard <span id="view-year-label" style="color:var(--accent)">ALL</span></h2>
    <button class="btn btn-ghost" style="color:var(--red)" onclick="resetData()">전체 초기화</button>
  </div>

  <div class="summary-grid">
<div class="s-card">
  <div class="s-label">최종 목표 달성률</div>
  <div class="s-value" id="s-goal-progress" style="color:var(--accent)">0%</div>
  <div class="s-sub" id="s-goal-remain">최종 목표까지 -</div>
</div>
    <div class="s-card"><div class="s-label">총 자산</div><div class="s-value" id="s-total">0</div><div class="s-sub" id="s-total-sub">-</div></div>
    <div class="s-card"><div class="s-label">지난 기록 대비 변동</div><div class="s-value" id="s-change-rate">0%</div><div class="s-sub" id="s-change-abs">0 만원</div></div>
    <div class="s-card"><div class="s-label">필요 연 수익률</div><div class="s-value" id="s-req-yield" style="color:var(--amber)">0%</div><div class="s-sub">2033년 도달 기준</div></div>
    <div class="s-card"><div class="s-label">월 현금흐름 (4%)</div><div class="s-value" id="s-cashflow" style="color:var(--green)">0</div><div class="s-sub">은퇴 시 인출 가능액</div></div>
    <div class="s-card"><div class="s-label">리밸런싱</div><div class="s-value" id="s-status">정상</div><div class="s-sub" id="s-status-sub">-</div></div>
  </div>

  <div class="year-tabs" id="yearTabs">
    <button class="tab-btn active" onclick="setYear('ALL', this)">ALL</button>
  </div>

  <div class="grid-main">
    <div class="card">
      <div class="card-title">성장 시각화</div>
      <div style="height: 380px;"><canvas id="mainChart"></canvas></div>
    </div>
    <div class="card" style="display: flex; flex-direction: column;">
      <div class="card-title">포트폴리오 비중</div>
      <div style="flex: 1; min-height: 200px;"><canvas id="pieChart"></canvas></div>
      <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px;">
        <label style="font-size:11px; color:var(--text3)">리밸런싱 타겟 / 임계치(%)</label>
        <div style="display:flex; gap:5px; margin-top:5px;">
          <select id="cfg-target" onchange="saveCfg()" style="flex:1"></select>
          <input type="number" id="cfg-threshold" step="0.1" style="width:70px;" oninput="saveCfg()">
        </div>
      </div>
    </div>
  </div>

  <div class="grid-main">
    <div class="card">
        <div class="card-title">데이터 기록</div>
        <div class="table-wrap"><table><thead id="table-head"></thead><tbody id="table-body"></tbody></table></div>
        <div style="margin-top:20px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; border-top:1px solid var(--border); padding-top:20px;">
          <div style="width:140px;"><label style="display:block; font-size:11px; color:var(--text3); margin-bottom:5px;">기록 날짜</label><input type="date" id="in-date"></div>
          <div id="in-values" style="display:flex; gap:8px; flex:1;"></div>
          <button class="btn btn-primary" onclick="addRow()">기록 추가</button>
        </div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 20px;">
        <div class="card">
            <div class="card-title">보유 종목 관리</div>
            <div id="ticker-list" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:12px;"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="new-ticker" style="text-transform:uppercase" placeholder="TICKER"><button class="btn btn-primary" onclick="addTicker()">추가</button></div>
        </div>
        <div class="card" style="flex: 1;">
            <div class="card-title">Investment Principle</div>
            <textarea id="memo-area" style="height: 250px;" placeholder="투자 원칙이나 전략을 기록하세요..." oninput="saveMemo()"></textarea>
        </div>
    </div>
  </div>
</div>

function initTabs() {
  const container = document.getElementById('yearTabs');
  ['2025','2026','2027','2028','2029','2030','2031','2032'].forEach(y => {
    const btn = document.createElement('button'); btn.className = 'tab-btn'; btn.textContent = y;

  });
  document.getElementById('memo-area').value = localStorage.getItem('invest_memo') || "";
  document.getElementById('cfg-threshold').value = CFG.threshold;
}

function setYear(year, btn) {
  currentYear = year;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('view-year-label').textContent = year;
  render();
}

function calculateRequiredYield(currentVal, goalVal, goalDate) {
    const today = new Date();
    const target = new Date(goalDate);
    const yearsLeft = (target - today) / (1000 * 60 * 60 * 24 * 365.25);
    if (yearsLeft <= 0) return 0;
    return (Math.pow(goalVal / currentVal, 1 / yearsLeft) - 1) * 100;
}

function render() {
  localStorage.setItem('tk_v2.0', JSON.stringify(TICKERS));
  localStorage.setItem('rw_v2.0', JSON.stringify(ROWS));
  localStorage.setItem('cf_v2.0', JSON.stringify(CFG));

  const filteredReal = currentYear === 'ALL' ? ROWS : ROWS.filter(r => r.date.startsWith(currentYear));
  const lastReal = ROWS.length > 0 ? ROWS[ROWS.length-1] : {vals:TICKERS.map(()=>0)};
  const currentTotal = total(lastReal);
  const finalGoal = GOAL_DATA[GOAL_DATA.length-1];

  // 1. 목표 달성률 업데이트
  if (ROWS.length > 0) {
    const progress = (currentTotal / finalGoal.val) * 100;
    const remaining = finalGoal.val - currentTotal;
    const progressEl = document.getElementById('s-goal-progress');
    progressEl.textContent = `${progress.toFixed(2)}%`;
    progressEl.style.color = progress >= 100 ? 'var(--green)' : 'var(--accent)';
    document.getElementById('s-goal-remain').textContent = remaining > 0 ? `목표까지 ${fmt(remaining)} 만원 남음` : "목표 달성! 🎉";
  }

  // 2. 리밸런싱 알림 로직 (수정됨)
  const statusEl = document.getElementById('s-status');
  const statusSubEl = document.getElementById('s-status-sub');
  const targetIdx = TICKERS.indexOf(CFG.target);
  
  if (currentTotal > 0 && targetIdx >= 0) {
    const currentP = (lastReal.vals[targetIdx] / currentTotal) * 100;
    const lastRow = ROWS.length >= 2 ? ROWS[ROWS.length-2] : null;
    const prevTotal = lastRow ? total(lastRow) : 0;
    const prevP = (prevTotal > 0) ? (lastRow.vals[targetIdx] / prevTotal * 100) : currentP;
    
    // 이전 기록 대비 비중 변화가 설정한 임계치(Threshold) 이상인지 체크
    const drift = Math.abs(currentP - prevP);
    
    if (drift >= CFG.threshold) {
      statusEl.textContent = "NEED";
      statusEl.style.color = "var(--red)";
      statusSubEl.textContent = `${CFG.target} 비중 변동: ${drift.toFixed(1)}%p`;
    } else {
      statusEl.textContent = "NOT YET";
      statusEl.style.color = "var(--green)";
      statusSubEl.textContent = `${CFG.target} 현재 비중: ${currentP.toFixed(1)}%`;
    }
  }

  // 3. 자산 변동 및 요약 데이터
  if (ROWS.length >= 2) {
    const prev = total(ROWS[ROWS.length-2]);
    const diff = currentTotal - prev;
    const rate = (diff / prev * 100).toFixed(2);
    const el = document.getElementById('s-change-rate');
    el.textContent = `${rate > 0 ? '+' : ''}${rate}%`;
    el.style.color = diff >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('s-change-abs').textContent = `${fmt(diff)} 만원`;
  }

  const reqYield = calculateRequiredYield(currentTotal, finalGoal.val, finalGoal.date);
  document.getElementById('s-req-yield').textContent = `${reqYield.toFixed(2)}%`;
  document.getElementById('s-total').textContent = `${fmt(currentTotal)} 만원`;
  document.getElementById('s-total-sub').textContent = currentYear === 'ALL' ? '현재 총 평가액' : `${currentYear}년 자산`;
  document.getElementById('s-cashflow').textContent = `${fmt(currentTotal * 0.04 / 12)} 만원`;

  // UI 요소 업데이트
  document.getElementById('cfg-target').innerHTML = TICKERS.map(t => `<option value="${t}" ${t===CFG.target?'selected':''}>${t}</option>`).join('');
  document.getElementById('ticker-list').innerHTML = TICKERS.map((t,i) => `<div style="background:var(--bg3); padding:4px 8px; border-radius:6px; font-size:11px; border:1px solid var(--border2); display:flex; gap:5px; align-items:center;">${t} <span onclick="removeTicker(${i})" style="cursor:pointer; color:var(--text3)">×</span></div>`).join('');
  document.getElementById('table-head').innerHTML = `<tr><th>날짜</th>${TICKERS.map(t=>`<th>${t}</th>`).join('')}<th>합계</th><th></th></tr>`;
  
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  filteredReal.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.date}</td>` + 
      TICKERS.map((_, ci) => `<td><input type="number" value="${r.vals[ci]}" onchange="editValue('${r.date}', ${ci}, this.value)"></td>`).join('') +
      `<td style="color:var(--accent); font-weight:600">${fmt(total(r))}</td>
       <td><button onclick="delRow('${r.date}')" style="background:none; border:none; color:var(--text3); cursor:pointer">×</button></td>`;
    tbody.appendChild(tr);
  });

  document.getElementById('in-values').innerHTML = TICKERS.map(t => `<input type="number" id="nv-${t}" placeholder="${t}">`).join('');
  updateCharts(filteredReal, lastReal);
}

function updateCharts(filteredReal, lastReal) {
  const filteredGoals = currentYear === 'ALL' ? GOAL_DATA : GOAL_DATA.filter(d => d.date.startsWith(currentYear));
  const allDates = Array.from(new Set([...filteredGoals.map(d=>d.date), ...filteredReal.map(d=>d.date)])).sort();
  const realMap = {}; filteredReal.forEach(r => realMap[r.date] = total(r));
  const goalMap = {}; filteredGoals.forEach(g => goalMap[g.date] = g.val);
  
  mainChart.data.labels = allDates;
  mainChart.data.datasets[0].data = allDates.map(d => goalMap[d] ?? null);
  mainChart.data.datasets[1].data = allDates.map(d => realMap[d] ?? null);
  mainChart.update();

  pieChart.data.labels = TICKERS;
  pieChart.data.datasets[0].data = lastReal.vals;
  pieChart.update();
}

window.addEventListener('load', function() {

  fetch(jsonUrl)
    .then(response => {
      if (!response.ok) throw new Error('네트워크 응답 에러');
      return response.json();
    })
    .then(data => {
      // 1. 데이터 검증
      if (!data.rows || !data.tickers) {
        console.error("JSON 형식이 맞지 않습니다:", data);
        return;
      }

      const localData = localStorage.getItem('rw_v2.0');
      const incomingDataStr = JSON.stringify(data.rows);

      // 2. 데이터가 다르거나 없을 경우 업데이트
      if (!localData || localData !== incomingDataStr) {
        localStorage.setItem('rw_v2.0', incomingDataStr);
        localStorage.setItem('tk_v2.0', JSON.stringify(data.tickers));
        localStorage.setItem('cf_v2.0', JSON.stringify(data.cfg));
        if (data.memo) localStorage.setItem('invest_memo', data.memo);

        alert("새로운 데이터를 성공적으로 불러왔습니다! 화면을 갱신합니다.");
        location.reload(); // 이 줄이 있어야 화면에 바로 반영됩니다.
      }
    })
    .catch(err => {
      console.error("데이터 로드 실패:", err);
    });
});
  // --- 여기까지 새로 넣는 코드 끝 ---

  window.importData = function(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        if (confirm('기존 데이터를 모두 지우고 백업 파일을 불러올까요?')) {
          localStorage.setItem('rw_v2.0', JSON.stringify(data.rows));
          localStorage.setItem('tk_v2.0', JSON.stringify(data.tickers));
          localStorage.setItem('cf_v2.0', JSON.stringify(data.cfg));
          if (data.memo) localStorage.setItem('invest_memo', data.memo);
          location.reload();
        }
      } catch (err) { alert('파일 읽기 오류'); }
    };
    reader.readAsText(file);
  };
};

function exportData() {

        rows: ROWS,
        cfg: CFG,
        memo: localStorage.getItem('invest_memo')
    };
    const blob = new Blob([JSON.stringify(dataObj, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dudu_asset_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
}

// 2. 데이터 불러오기 (JSON 파일 읽기)
function importData(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const data = JSON.parse(e.target.result);
            
            // 데이터 구조 검증
            if (!data.tickers || !data.rows) {
                throw new Error("올바른 JSON 형식이 아닙니다.");
            }

            // 변수 업데이트 및 로컬 스토리지 저장
            TICKERS = data.tickers;
            ROWS = data.rows;
            if (data.cfg) CFG = data.cfg;
            if (data.memo) {
                localStorage.setItem('invest_memo', data.memo);
                document.getElementById('memo-area').value = data.memo;
            }

            alert("데이터를 성공적으로 불러왔습니다.");
            render(); // 화면 즉시 갱신
        } catch (err) {
            alert("파일 읽기 오류: " + err.message);
        }
    };
    reader.readAsText(file);
}

function addTicker() {
    const input = document.getElementById('new-ticker');
    const ticker = input.value.toUpperCase().trim();
    if (ticker && !TICKERS.includes(ticker)) {
        TICKERS.push(ticker);
        // 기존 기록들에 새 티커용 0값 추가
        ROWS.forEach(r => r.vals.push(0));
        input.value = '';
        render();
    }
}

// 아래와 같이 별도 함수로 빼서 render()에서 호출하게 수정하세요.
function updateTickerListUI() {
    const list = document.getElementById('ticker-list');
    list.innerHTML = TICKERS.map(t => `
        <span class="btn btn-ghost" style="display:flex; align-items:center; gap:8px;">
            ${t}
            <span onclick="removeTicker('${t}')" style="cursor:pointer; color:var(--red); font-weight:bold;">×</span>
        </span>
    `).join('');
}

function removeTicker(t) {
    if (TICKERS.length <= 1) return alert("최소 한 개의 종목은 있어야 합니다.");
    if (confirm(`${t} 종목을 삭제하시겠습니까? 관련 기록도 함께 삭제됩니다.`)) {
        const idx = TICKERS.indexOf(t);
        TICKERS.splice(idx, 1);
        ROWS.forEach(r => r.vals.splice(idx, 1));
        render();
    }
}

// 기존 render 함수 마지막 줄에 updateTickerListUI(); 를 추가하세요.
